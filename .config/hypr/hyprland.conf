# hyprland.conf (PORTABLE) — charcoal-glass theme
# source = ~/.config/hypr/vm.conf

monitor = eDP-1, 1920x1200@60, 0x0, 1.25

$terminal    = kitty
$fileManager = thunar
$menu        = wofi --show drun

input {
    kb_layout = fr
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    # charcoal-glass: muted grey-blue active, near-invisible inactive
    col.active_border = rgba(7d9bc4cc) rgba(9db4d8cc) 45deg
    col.inactive_border = rgba(16181f88)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 18

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.015
        contrast = 1.1
        brightness = 0.9
        vibrancy = 0.2
        vibrancy_darkness = 0.5
    }

    active_opacity = 0.92
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000066)
    }

    dim_inactive = true
    dim_strength = 0.1
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = liquid, 0.23, 1, 0.32, 1
    animation = windows, 1, 6, liquid, popin 80%
    animation = windowsOut, 1, 6, liquid, popin 80%
    animation = fade, 1, 6, liquid
    animation = border, 1, 8, liquid
    animation = workspaces, 1, 6, liquid, slide
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, F, fullscreen,
bind = $mainMod, X, exec, wlogout

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Autostart
exec-once = awww-daemon
exec-once = sleep 1 && awww img ~/.config/wallpapers/mountfuji.jpg --transition-type fade
exec-once = mako

# Screenshots
bind = , Print, exec, grim - | swappy -f -
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Clipboard history
exec-once = wl-paste --watch cliphist store
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Media & brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Polkit, lock, idle, bar
exec-once = /usr/lib/polkit-gnome-authentication-agent-1
bind = $mainMod, L, exec, hyprlock
exec-once = hypridle
exec-once = waybar