# hyprlock.conf 
# Hyprlock configuration file

background {
    monitor =
    path = ~/.config/wallpapers/mountfuji.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.015
    contrast = 1.0
    brightness = 0.7
    vibrancy = 0.18
    vibrancy_darkness = 0.55
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(212, 216, 224, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = rgba(122, 128, 140, 1.0)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 95
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    outer_color = rgba(90, 104, 128, 0.45)
    inner_color = rgba(20, 22, 28, 0.65)
    font_color = rgba(212, 216, 224, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##5a5f6b">Password</span>
    hide_input = false
    rounding = 18
    check_color = rgba(126, 158, 130, 1.0)
    fail_color = rgba(178, 116, 128, 1.0)
    fail_text = <span foreground="##b27480">try again</span>
    position = 0, -40
    halign = center
    valign = center
}