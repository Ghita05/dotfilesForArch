# hyprlock lock screen config (PORTABLE)
background {
    monitor =
    path = ~/.config/wallpapers/ATLA.jpg
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
}

input-field {
    monitor = 
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(136, 170, 255, 0.9)
    inner_color = rgba(20, 20, 31, 0.85)
    font_color = rgba(224, 224, 240, 1.0)
    placeholder_text = <span foreground="##8a8aa0">Password...</span>
    fade_on_empty = false
    rounding = 14
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

