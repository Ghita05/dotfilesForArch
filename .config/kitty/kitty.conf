# kitty.conf — charcoal-glass theme

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Window / glass
background_opacity        0.75
dynamic_background_opacity yes
background_blur           1
window_padding_width      12
confirm_os_window_close   0
hide_window_decorations   yes

# Charcoal-glass palette
foreground            #d8dce5
background            #0d0e12
selection_foreground  #0d0e12
selection_background  #7d9bc4
cursor                #9db4d8
cursor_text_color     #0d0e12

# Tabs (subtle)
active_tab_foreground   #0d0e12
active_tab_background   #7d9bc4
inactive_tab_foreground #6b7080
inactive_tab_background #16181f
tab_bar_background      #0d0e12

# url
url_color #9db4d8

# Normal colors (grey-blue tinted, low saturation)
color0  #16181f
color8  #2a2d38
# red
color1  #c47d8a
color9  #d89ba6
# green
color2  #8aac8e
color10 #a6c4aa
